changes:
  - rscadd: "THE ROOTS SEE ALL. THE ROOTS HEAR ALL. THE FEY KNOW ALL."
  - rscadd: "Hags will no longer be ambushed in the bog, regardless of whether they are in true form"
  - rscadd: "Added the Bogwalker boon, grants immunity to some (but not all) dangers of the bog"
  - rscadd: "Hag guidebook now has descriptions for all boons, not just some"
  - bugfix: "Fixed several hag-related typos"
  - bugfix: "Bushes, grass, thorns, and twigs now have their visual and sound cues tied to whether or not you can actually ambushed from them"
  - bugfix: "Woodwalker logic now actually works instead of being overridden when you don't have Azure Native"
  - bugfix: "Hag emotes are no longer silent while using the default voicepack"